<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Yui — ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #08090A;
    --panel: #0F1011;
    --surface: #191A1B;
    --surface-raised: #1F2023;
    --border: rgba(255,255,255,.08);
    --text: #F7F8F8;
    --secondary: #D0D6E0;
    --sub: #8A8F98;
    --quiet: #62666D;
    --accent: #6E5BD6;
    --accent-hover: #828FFF;
    --accent-light: #B3A8FF;
    --ask: #F0B429;
    --progress: #C99BFF;
    --done: #4FD18B;
    --off: #E05A5A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "IBM Plex Sans JP", -apple-system, "Hiragino Sans", "Yu Gothic UI", "Segoe UI", sans-serif;
    min-height: 100vh;
  }
  header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
    position: sticky;
    top: 0;
    background: rgba(8,9,10,.92);
    backdrop-filter: blur(12px);
  }
  header h1 { color: var(--sub); font-size: 13px; font-weight: 600; margin: 0; letter-spacing: 0.12em; }
  header a { color: var(--sub); font-size: 13px; text-decoration: none; margin-left: auto; }
  header a:hover { color: var(--accent-light); }

  main {
    max-width: 880px;
    margin: 0 auto;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }
  section h2 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--sub);
    text-transform: uppercase;
    margin: 0 0 12px;
  }
  #ask-section h2 { color: var(--ask); }
  #progress-section h2 { color: var(--progress); }
  #done-section h2 { color: var(--done); }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 10px;
    transition: border-color 150ms ease-out, background 150ms ease-out, transform 150ms ease-out;
  }
  .card-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .card:hover { background: var(--surface-raised); border-color: rgba(255,255,255,.14); }
  .card-title { font-weight: 600; font-size: 16px; }
  .card-note { font-size: 14px; color: var(--sub); line-height: 1.6; white-space: pre-wrap; margin-top: 6px; }
  .badge {
    font-size: 13px;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--sub);
  }
  .priority-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    flex: 0 0 8px;
    margin-right: 6px;
    border-radius: 50%;
    vertical-align: 1px;
  }
  .card.ask { border-color: var(--ask); }
  .card.ask .card-note { color: var(--ask); }
  .card.progress { border-color: var(--progress); }
  .card.done { background: var(--panel); border-color: var(--done); opacity: 0.6; }
  .card.done .card-title { text-decoration: line-through; }
  .card.high-priority { border-left: 4px solid var(--off); }
  .card.high-priority .card-title { font-weight: 700; }
  .age-badge.age-caution { color: var(--ask); border-color: var(--ask); }
  .age-badge.age-warning { color: var(--off); border-color: var(--off); }

  .answer-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .answer-row input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 14px;
  }
  .answer-row button {
    background: var(--accent);
    color: var(--text);
    border: none;
    border-radius: 8px;
    padding: 0 14px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: background 150ms ease-out, transform 150ms ease-out;
  }
  .answer-row button:hover { background: var(--accent-hover); }
  .answer-row button:active, .complete-button:active, .dismiss-button:active { transform: translateY(1px); }
  .complete-button {
    margin-left: auto;
    background: transparent;
    color: var(--done);
    border: 1px solid var(--done);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: background 150ms ease-out, border-color 150ms ease-out, transform 150ms ease-out;
  }
  .complete-button:disabled { opacity: 0.5; cursor: default; }
  .complete-button:hover { background: rgba(79,209,139,.12); }
  .dismiss-button {
    background: transparent;
    color: var(--sub);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: background 150ms ease-out, border-color 150ms ease-out, color 150ms ease-out, transform 150ms ease-out;
  }
  .dismiss-button:hover { color: #e05a5a; border-color: #e05a5a; }
  .dismiss-button:disabled { opacity: 0.5; cursor: default; }
  .empty { color: var(--sub); font-size: 14px; }

  /* ---- アクセシビリティ（WCAG 2.2 AA）---- */
  :focus-visible { outline: 2px solid var(--accent-light); outline-offset: 4px; box-shadow: 0 0 0 4px rgba(179,168,255,.25); }
  #error-banner {
    max-width: 880px;
    margin: 16px auto 0;
    padding: 12px 16px;
    background: rgba(224,90,90,.14);
    border: 1px solid var(--off);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
  }
  #error-banner[hidden] { display: none; }
  .visually-hidden {
    position: absolute;
    width: 1px; height: 1px;
    margin: -1px; padding: 0; border: 0;
    clip-path: inset(50%);
    overflow: hidden;
    white-space: nowrap;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
    }
  }
</style>
</head>
<body>
  <div id="srLive" role="status" aria-live="polite" class="visually-hidden"></div>
  <header>
    <h1>YUI DASHBOARD</h1>
    <a href="/">← 対話に戻る</a>
  </header>
  <div id="error-banner" role="alert" hidden></div>
  <main>
    <section id="ask-section">
      <h2>ゆいから質問があります</h2>
      <div id="ask-list" role="list"></div>
    </section>
    <section id="progress-section">
      <h2>ゆいが進めています</h2>
      <div id="progress-list" role="list"></div>
    </section>
    <section id="open-section">
      <h2>未着手</h2>
      <div id="open-list" role="list"></div>
    </section>
    <section id="done-section">
      <h2>完了</h2>
      <div id="done-list" role="list"></div>
    </section>
  </main>

<script>
const priorityColor = ['', '#8A8F98', '#4FD18B', '#F0B429', '#E8883A', '#E05A5A'];

// 対話UIと同じアプリトークン。?token=XXX で開くと保持し、保護APIに付与する。
const APP_TOKEN = (() => {
  const key = 'yui_app_token';
  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get('token');
  if (fromUrl) {
    sessionStorage.setItem(key, fromUrl);
    params.delete('token');
    const query = params.toString();
    const cleanUrl = window.location.pathname + (query ? `?${query}` : '') + window.location.hash;
    history.replaceState(null, '', cleanUrl);
    return fromUrl;
  }
  return sessionStorage.getItem(key) || '';
})();

function apiFetch(url, options = {}) {
  const headers = { ...(options.headers || {}) };
  if (APP_TOKEN) headers['X-Yui-Token'] = APP_TOKEN;
  return fetch(url, { ...options, headers });
}

// スクリーンリーダー通知（再描画で消える操作結果を伝える）
const srLiveEl = document.getElementById('srLive');
function announce(text) {
  srLiveEl.textContent = '';
  setTimeout(() => { srLiveEl.textContent = text; }, 50);
}

const errorBannerEl = document.getElementById('error-banner');
function showError(err, message = '操作に失敗しました。少し待ってからもう一度お試しください') {
  console.error('[yui dashboard]', err);
  errorBannerEl.textContent = err && err.status === 401
    ? 'トークンが無効です。URL の ?token= を確認してください'
    : message;
  errorBannerEl.hidden = false;
}

function clearError() {
  errorBannerEl.hidden = true;
  errorBannerEl.textContent = '';
}

function focusSectionHeading(section) {
  const heading = section && section.querySelector('h2');
  if (!heading) return;
  heading.setAttribute('tabindex', '-1');
  heading.focus();
}

function taskTimestamp(task) {
  return task.last_mentioned_at || task.updated_at || task.created_at || null;
}

function relativeAge(timestamp) {
  if (!timestamp) return null;
  const time = new Date(timestamp).getTime();
  if (Number.isNaN(time)) return null;

  const elapsed = Math.max(0, Date.now() - time);
  const minutes = Math.floor(elapsed / 60000);
  const hours = Math.floor(elapsed / 3600000);
  const days = Math.floor(elapsed / 86400000);
  if (days >= 1) return { text: `${days}日前`, days };
  if (hours >= 1) return { text: `${hours}時間前`, days };
  if (minutes >= 1) return { text: `${minutes}分前`, days };
  return { text: 'たった今', days };
}

function taskTime(task) {
  const timestamp = taskTimestamp(task);
  const time = timestamp ? new Date(timestamp).getTime() : Number.NaN;
  return Number.isNaN(time) ? Number.POSITIVE_INFINITY : time;
}

function card(task, extraClass) {
  const div = document.createElement('div');
  const priority = Number(task.priority) || 1;
  div.className = 'card' + (extraClass ? ' ' + extraClass : '') + (priority >= 4 ? ' high-priority' : '');
  div.setAttribute('role', 'listitem');

  const top = document.createElement('div');
  top.className = 'card-top';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.setAttribute('aria-label', `優先度${priority}`);
  const priorityDot = document.createElement('span');
  priorityDot.className = 'priority-dot';
  priorityDot.setAttribute('aria-hidden', 'true');
  priorityDot.style.backgroundColor = priorityColor[priority] || priorityColor[1];
  badge.appendChild(priorityDot);
  badge.appendChild(document.createTextNode(`優先度${priority}・言及${task.mention_count}回`));
  const title = document.createElement('span');
  title.className = 'card-title';
  title.textContent = task.title;
  top.appendChild(title);
  top.appendChild(badge);
  const age = relativeAge(taskTimestamp(task));
  if (age) {
    const ageBadge = document.createElement('span');
    ageBadge.className = 'badge age-badge';
    ageBadge.textContent = age.text;
    if (age.days >= 7) ageBadge.classList.add('age-warning');
    else if (age.days >= 3) ageBadge.classList.add('age-caution');
    top.appendChild(ageBadge);
  }
  if (task.status !== 'done') {
    const completeBtn = document.createElement('button');
    completeBtn.className = 'complete-button';
    completeBtn.textContent = '完了';
    completeBtn.setAttribute('aria-label', `「${task.title}」を完了にする`);
    completeBtn.addEventListener('click', async () => {
      completeBtn.disabled = true;
      try {
        const res = await apiFetch(`/tasks/${task.id}/complete`, { method: 'POST' });
        if (!res.ok) throw Object.assign(new Error(`/tasks/${task.id}/complete ${res.status}`), { status: res.status });
        announce(`「${task.title}」を完了にしました`);
        if (await load({ force: true })) focusSectionHeading(div.closest('section'));
      } catch (err) {
        completeBtn.disabled = false;
        showError(err);
      }
    });
    top.appendChild(completeBtn);

    // 誤って拾われたタスクをワンタップで取り消す（音声だと誤タスクに気づけないため）
    const dismissBtn = document.createElement('button');
    dismissBtn.className = 'dismiss-button';
    dismissBtn.textContent = '取消';
    dismissBtn.setAttribute('aria-label', `「${task.title}」を取り消す`);
    dismissBtn.addEventListener('click', async () => {
      dismissBtn.disabled = true;
      try {
        const res = await apiFetch(`/tasks/${task.id}`, { method: 'DELETE' });
        if (!res.ok) throw Object.assign(new Error(`/tasks/${task.id} ${res.status}`), { status: res.status });
        announce(`「${task.title}」を取り消しました`);
        if (await load({ force: true })) focusSectionHeading(div.closest('section'));
      } catch (err) {
        dismissBtn.disabled = false;
        showError(err);
      }
    });
    top.appendChild(dismissBtn);
  }
  div.appendChild(top);

  if (task.pending_question) {
    const q = document.createElement('div');
    q.className = 'card-note';
    q.textContent = '❓ ' + task.pending_question;
    div.appendChild(q);

    const row = document.createElement('div');
    row.className = 'answer-row';
    const input = document.createElement('input');
    input.placeholder = '答えを入力…';
    input.setAttribute('aria-label', 'ゆいの質問への答え');
    const btn = document.createElement('button');
    btn.textContent = '送信';
    btn.setAttribute('aria-label', `「${task.title}」への回答を送信`);
    btn.addEventListener('click', async () => {
      if (!input.value.trim()) return;
      btn.disabled = true;
      try {
        const res = await apiFetch(`/tasks/${task.id}/answer`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ answer: input.value.trim() }),
        });
        if (!res.ok) throw Object.assign(new Error(`/tasks/${task.id}/answer ${res.status}`), { status: res.status });
        announce('答えを送信しました');
        await load({ force: true });
      } catch (err) {
        btn.disabled = false;
        showError(err);
      }
    });
    row.appendChild(input);
    row.appendChild(btn);
    div.appendChild(row);
  } else if (task.agent_notes) {
    const note = document.createElement('div');
    note.className = 'card-note';
    note.textContent = task.agent_notes;
    div.appendChild(note);
  }

  return div;
}

function hasUnsavedInput() {
  return Array.from(document.querySelectorAll('.answer-row input'))
    .some((el) => el.value.trim().length > 0);
}

async function load({ force = false } = {}) {
  if (hasUnsavedInput()) return; // 回答入力中は再描画で消さない
  // カード内を操作中（未入力でも）は再描画でフォーカスを奪わない（2.4.3）
  const active = document.activeElement;
  if (!force && active && active.closest && active.closest('.card')) return;

  try {
    const res = await apiFetch('/tasks');
    if (!res.ok) throw Object.assign(new Error(`/tasks ${res.status}`), { status: res.status });
    const data = await res.json();
    const tasks = data.tasks || [];

    const askList = document.getElementById('ask-list');
    const progressList = document.getElementById('progress-list');
    const openList = document.getElementById('open-list');
    const doneList = document.getElementById('done-list');
    askList.innerHTML = '';
    progressList.innerHTML = '';
    openList.innerHTML = '';
    doneList.innerHTML = '';

    const asks = tasks.filter((t) => t.status === 'needs_input');
    const progressing = tasks.filter((t) => t.status === 'in_progress');
    const open = tasks
      .filter((t) => t.status === 'open' || !t.status)
      .sort((a, b) => taskTime(a) - taskTime(b));
    const done = tasks.filter((t) => t.status === 'done');

    if (!asks.length) askList.innerHTML = '<div class="empty">今のところありません</div>';
    asks.forEach((t) => askList.appendChild(card(t, 'ask')));

    if (!progressing.length) progressList.innerHTML = '<div class="empty">今のところありません</div>';
    progressing.forEach((t) => progressList.appendChild(card(t, 'progress')));

    if (!open.length) openList.innerHTML = '<div class="empty">今のところありません</div>';
    open.forEach((t) => openList.appendChild(card(t)));

    if (!done.length) doneList.innerHTML = '<div class="empty">まだありません</div>';
    done.forEach((t) => doneList.appendChild(card(t, 'done')));
    clearError();
    return true;
  } catch (err) {
    showError(err, 'タスクを読み込めませんでした。少し待ってからもう一度お試しください');
    return false;
  }
}

load();
setInterval(load, 15000);
</script>
</body>
</html>
