<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Yui</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #08090A;
    --panel: #0F1011;
    --surface: #191A1B;
    --surface-raised: #1F2023;
    --text: #F7F8F8;
    --secondary: #D0D6E0;
    --sub: #8A8F98;
    --quiet: #62666D;
    --accent: #6E5BD6;
    --accent-hover: #828FFF;
    --accent-light: #B3A8FF;
    --ambient: #6E5BD6;
    --captured: #4FD18B;
    --speaking: #6E5BD6;
    --thinking: #C99BFF;
    --off: #E05A5A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "IBM Plex Sans JP", -apple-system, "Hiragino Sans", "Yu Gothic UI", "Segoe UI", sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
  }
  h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.32em; color: var(--sub); margin: 0 0 4px 0.32em; }
  .wordmark-note { margin: 0; color: var(--sub); font-size: 12px; line-height: 1.5; }
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  #orb {
    width: 168px;
    height: 168px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 28%, #23242b 0%, var(--panel) 62%, #0b0c0d 100%);
    border: 1px solid rgba(255,255,255,.08);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 200ms ease-out, box-shadow 200ms ease-out, transform 200ms ease-out, background 200ms ease-out;
    cursor: pointer;
  }
  .orb-bars {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 48px;
  }
  .orb-bars span {
    width: 5px;
    height: 8px;
    border-radius: 999px;
    background: #1F2023;
    transform: scaleY(.4);
    transform-origin: center;
  }
  #orb:hover { border-color: rgba(179,168,255,.8); background: radial-gradient(circle at 35% 28%, #2a2c38 0%, var(--surface-raised) 62%, var(--panel) 100%); }
  #orb.ambient { border-color: var(--ambient); box-shadow: inset 0 0 0 1px rgba(179,168,255,.16), 0 0 32px rgba(110,91,214,.18); animation: breathe 3.2s ease-in-out infinite; }
  #orb.ambient .orb-bars span { height: 30px; background: var(--accent-light); animation: ambient-bars 2.4s ease-in-out infinite; }
  #orb.ambient .orb-bars span:nth-child(1) { animation-delay: -0.48s; }
  #orb.ambient .orb-bars span:nth-child(2) { animation-delay: -0.24s; }
  #orb.ambient .orb-bars span:nth-child(3) { animation-delay: 0s; }
  #orb.ambient .orb-bars span:nth-child(4) { animation-delay: -0.24s; }
  #orb.ambient .orb-bars span:nth-child(5) { animation-delay: -0.48s; }
  #orb.captured { border-color: var(--captured); box-shadow: inset 0 0 0 1px rgba(79,209,139,.2), 0 0 32px rgba(79,209,139,.24); }
  #orb.captured .orb-bars span { height: 30px; background: #4fd18b; transform: scaleY(1); }
  #orb.thinking { border-color: var(--thinking); box-shadow: inset 0 0 0 1px rgba(201,155,255,.2), 0 0 32px rgba(201,155,255,.2); }
  #orb.thinking .orb-bars span { background: #1F2023; }
  #orb.thinking .orb-bars span:nth-child(3) { height: 30px; background: var(--thinking); animation: thinking-bar 1.1s ease-in-out infinite; }
  #orb.speaking { border-color: var(--accent-light); box-shadow: inset 0 0 0 1px rgba(179,168,255,.2), 0 0 36px rgba(110,91,214,.3); animation: pulse 0.9s ease-in-out infinite; }
  #orb.speaking .orb-bars span { height: 30px; background: var(--accent); animation: speaking-bars .7s ease-in-out infinite; }
  #orb.speaking .orb-bars span:nth-child(1) { animation-delay: -0.18s; }
  #orb.speaking .orb-bars span:nth-child(2) { animation-delay: -0.36s; }
  #orb.speaking .orb-bars span:nth-child(3) { animation-delay: -0.52s; }
  #orb.speaking .orb-bars span:nth-child(4) { animation-delay: -0.28s; }
  #orb.speaking .orb-bars span:nth-child(5) { animation-delay: -0.08s; }

  @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.85; } 50% { transform: scale(1.03); opacity: 1; } }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  @keyframes ambient-bars { 0%, 100% { transform: scaleY(.25); } 50% { transform: scaleY(1); } }
  @keyframes thinking-bar { 0%, 100% { transform: scaleY(.35); } 50% { transform: scaleY(1); } }
  @keyframes speaking-bars { 0%, 100% { transform: scaleY(.25); } 35% { transform: scaleY(1); } 65% { transform: scaleY(.45); } }

  #status { font-size: 14px; color: var(--sub); min-height: 20px; }
  #status::before { content: ""; display: inline-block; width: 8px; height: 8px; margin-right: 8px; border-radius: 50%; background: var(--quiet); vertical-align: 1px; }
  #orb.ambient ~ #status::before, #orb.speaking ~ #status::before { background: var(--accent); box-shadow: 0 0 12px rgba(110,91,214,.72); }
  #orb.captured ~ #status::before { background: var(--captured); box-shadow: 0 0 12px rgba(79,209,139,.64); }
  #orb.thinking ~ #status::before { background: var(--thinking); box-shadow: 0 0 12px rgba(201,155,255,.64); }
  #hint { font-size: 14px; color: var(--sub); min-height: 20px; }
  #hint.error { color: var(--off); }

  #toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: transparent;
    color: var(--sub);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 999px;
    padding: 8px 18px;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: border-color 150ms ease-out, color 150ms ease-out, transform 150ms ease-out;
  }
  #toggle:hover { border-color: var(--accent); color: var(--secondary); }
  #toggle:active { transform: translateY(1px); }
  #toggle.on { border-color: var(--captured); color: var(--captured); }
  #toggle:disabled { opacity: 0.5; cursor: default; }
  #dashLink {
    position: fixed;
    top: 20px;
    left: 20px;
    color: var(--sub);
    font-size: 13px;
    text-decoration: none;
  }
  #dashLink:hover { color: var(--accent-light); }

  /* ---- アクセシビリティ（WCAG 2.2 AA）---- */
  :focus-visible { outline: 2px solid var(--accent-light); outline-offset: 4px; box-shadow: 0 0 0 4px rgba(179,168,255,.25); }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
    }
  }
</style>
</head>
<body>
  <main>
    <a id="dashLink" href="/dashboard.html">ダッシュボード →</a>
    <h1>YUI</h1>
    <p class="wordmark-note">そばに置くだけで、タスクを覚えておく</p>
    <button id="toggle" type="button" aria-pressed="false">そばに置く</button>
    <div id="orb" role="button" tabindex="0" aria-label="ゆいの状態表示"><span class="orb-bars" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></span></div>
    <div id="status" role="status" aria-live="polite">オフになっています</div>
    <div id="hint" aria-live="polite"></div>
  </main>

<script>
const orb = document.getElementById('orb');
const statusEl = document.getElementById('status');
const hintEl = document.getElementById('hint');
const toggleBtn = document.getElementById('toggle');

const sessionId = (() => {
  const key = 'yui_session_id';
  let id = localStorage.getItem(key);
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem(key, id);
  }
  return id;
})();

// アプリトークン: ?token=XXX で開くと sessionStorage に保持し、以後のAPI呼び出しに
// X-Yui-Token として付ける。本番は未認証だと保護エンドポイントが401になる。
const APP_TOKEN = (() => {
  const key = 'yui_app_token';
  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get('token');
  if (fromUrl) {
    sessionStorage.setItem(key, fromUrl);
    params.delete('token');
    const query = params.toString();
    const cleanUrl = window.location.pathname + (query ? `?${query}` : '') + window.location.hash;
    history.replaceState(null, '', cleanUrl);
    return fromUrl;
  }
  return sessionStorage.getItem(key) || '';
})();

function apiFetch(url, options = {}) {
  const headers = { ...(options.headers || {}) };
  if (APP_TOKEN) headers['X-Yui-Token'] = APP_TOKEN;
  return fetch(url, { ...options, headers });
}

function queryNumber(name, fallback, min, max) {
  const value = Number(new URLSearchParams(window.location.search).get(name));
  return Number.isFinite(value) && value >= min && value <= max ? value : fallback;
}

// 実測で体感遅延の最大要因の一つだったため短縮。切れやすい環境では ?silence= で戻す。
// ?silence=1800&threshold=12 のように、会場で再デプロイせず調整できる。
const SILENCE_MS = queryNumber('silence', 1600, 200, 10000);
const MIN_SPEECH_MS = queryNumber('minSpeech', 500, 100, 5000);
const MAX_RECORD_MS = queryNumber('maxRecord', 20000, 1000, 60000);
const VOICE_THRESHOLD = queryNumber('threshold', 10, 1, 128);
let ambientActive = false;
let currentState = 'off';
let tickerTimer = null;
let stream = null;
let audioCtx = null;
let analyser = null;
let vadTimer = null;
let mediaRecorder = null;
let recordedChunks = [];
let speechStartedAt = null;
let lastVoiceAt = null;
let maxRecordTimer = null;
let currentAudio = null;
let currentAudioUrl = null;
let currentAudioResolve = null;
let streamAudioEnd = 0;
const streamAudioSources = new Set();

function updateAmbientStatus() {
  statusEl.textContent = '聞いてるよ';
}

function setState(state) {
  currentState = state;
  orb.setAttribute('aria-label', state === 'speaking' ? '再生中の音声を停止' : 'ゆいの状態表示');
  orb.classList.remove('ambient', 'captured', 'thinking', 'speaking');
  if (state === 'ambient') {
    orb.classList.add('ambient');
    updateAmbientStatus();
  } else if (state === 'captured') {
    orb.classList.add('captured');
    statusEl.textContent = 'メモしたよ';
  } else if (state === 'thinking') {
    orb.classList.add('thinking');
    statusEl.textContent = '考えてる…';
  } else if (state === 'speaking') {
    orb.classList.add('speaking');
    statusEl.textContent = '話してる…';
  } else {
    statusEl.textContent = 'オフになっています';
  }
}

function stopVadWatch() {
  if (vadTimer) { clearInterval(vadTimer); vadTimer = null; }
  if (maxRecordTimer) { clearTimeout(maxRecordTimer); maxRecordTimer = null; }
}

function startVadWatch() {
  const data = new Uint8Array(analyser.fftSize);
  speechStartedAt = Date.now();
  lastVoiceAt = null;

  vadTimer = setInterval(() => {
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) {
      const v = data[i] - 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / data.length);

    const elapsed = Date.now() - speechStartedAt;
    if (rms > VOICE_THRESHOLD) {
      lastVoiceAt = Date.now();
    }
    if (lastVoiceAt && elapsed > MIN_SPEECH_MS && (Date.now() - lastVoiceAt) > SILENCE_MS) {
      stopRecording();
    }
  }, 100);

  maxRecordTimer = setTimeout(() => stopRecording(), MAX_RECORD_MS);
}

async function startListening() {
  if (!ambientActive) return;
  recordedChunks = [];
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) recordedChunks.push(e.data);
  };
  mediaRecorder.onstop = async () => {
    stopVadWatch();
    const blob = new Blob(recordedChunks, { type: 'audio/webm' });
    if (blob.size < 2000) {
      if (ambientActive) startListening();
      return;
    }
    await handleUtterance(blob);
  };
  mediaRecorder.start();
  setState('ambient');
  startVadWatch();
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

function showError(err) {
  console.error('[yui]', err);
  const unauthorized = err && err.status === 401;
  hintEl.classList.add('error');
  hintEl.textContent = unauthorized
    ? 'トークンが必要みたい。?token=... を付けたURLで開いてね'
    : 'うまく通信できなかったよ。少し待ってからもう一度話しかけてね';
}

function stopStreamAudio() {
  const hadAudio = streamAudioSources.size > 0;
  for (const source of streamAudioSources) {
    try { source.stop(); } catch (_) { /* Already stopped. */ }
  }
  streamAudioSources.clear();
  streamAudioEnd = audioCtx ? audioCtx.currentTime : 0;
  return hadAudio;
}

function base64ToArrayBuffer(data) {
  const binary = atob(data);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

async function queueStreamAudio(data) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  const audioBuffer = await audioCtx.decodeAudioData(base64ToArrayBuffer(data));
  queueAudioBuffer(audioBuffer);
}

function queueAudioBuffer(audioBuffer) {
  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(audioCtx.destination);
  const startsAt = Math.max(audioCtx.currentTime, streamAudioEnd);
  streamAudioEnd = startsAt + audioBuffer.duration;
  streamAudioSources.add(source);
  source.onended = () => streamAudioSources.delete(source);
  source.start(startsAt);
}

async function queueStreamPcm(data, rate) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  const pcm = new Int16Array(base64ToArrayBuffer(data));
  const audioBuffer = audioCtx.createBuffer(1, pcm.length, rate);
  const samples = audioBuffer.getChannelData(0);
  for (let i = 0; i < pcm.length; i++) samples[i] = pcm[i] / 32768;
  queueAudioBuffer(audioBuffer);
}

async function waitForStreamAudio() {
  if (!audioCtx || streamAudioEnd <= audioCtx.currentTime) return;
  await new Promise((resolve) => {
    setTimeout(resolve, Math.ceil((streamAudioEnd - audioCtx.currentTime) * 1000));
  });
}

async function readConverseStream(response, startedAt) {
  if (!response.body) throw new Error('/converse response body unavailable');
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let pending = '';
  let sawDone = false;
  let sawAudio = false;

  const handleEvent = async (event) => {
    if (event.type === 'transcript') {
      hintEl.classList.remove('error');
      hintEl.textContent = event.text || '';
    } else if (event.type === 'empty') {
      sawDone = true;
    } else if (event.type === 'audio') {
      if (!sawAudio) {
        sawAudio = true;
        console.info('[yui] first_audio_ms', Math.round(performance.now() - startedAt));
      }
      setState('speaking');
      await queueStreamAudio(event.data);
    } else if (event.type === 'pcm') {
      if (!sawAudio) {
        sawAudio = true;
        console.info('[yui] first_audio_ms', Math.round(performance.now() - startedAt));
      }
      setState('speaking');
      await queueStreamPcm(event.data, event.rate);
    } else if (event.type === 'done') {
      sawDone = true;
    } else if (event.type === 'error') {
      throw new Error(event.message || '/converse failed');
    }
  };

  while (true) {
    const { done, value } = await reader.read();
    pending += decoder.decode(value || new Uint8Array(), { stream: !done });
    const lines = pending.split('\n');
    pending = lines.pop();
    for (const line of lines) {
      if (line.trim()) await handleEvent(JSON.parse(line));
    }
    if (done) break;
  }
  if (pending.trim()) await handleEvent(JSON.parse(pending));
  if (!sawDone) throw new Error('/converse ended before done');
  await waitForStreamAudio();
}

async function fallbackUtterance(blob) {
  const transcribeRes = await apiFetch('/transcribe', {
    method: 'POST',
    headers: { 'Content-Type': 'audio/webm' },
    body: blob,
  });
  if (!transcribeRes.ok) {
    throw Object.assign(new Error(`/transcribe ${transcribeRes.status}`), { status: transcribeRes.status });
  }
  const transcribeData = await transcribeRes.json();
  const text = (transcribeData.text || '').trim();
  if (!text) return;

  const chatRes = await apiFetch('/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: sessionId, message: text }),
  });
  if (!chatRes.ok) {
    throw Object.assign(new Error(`/chat ${chatRes.status}`), { status: chatRes.status });
  }
  const chatData = await chatRes.json();
  if (chatData.reply) await speakAndWait(chatData.reply);
}

async function handleUtterance(blob) {
  setState('thinking');
  const startedAt = performance.now();
  try {
    const response = await apiFetch(`/converse?session_id=${encodeURIComponent(sessionId)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'audio/webm' },
      body: blob,
    });
    if (!response.ok) {
      throw Object.assign(new Error(`/converse ${response.status}`), { status: response.status });
    }
    await readConverseStream(response, startedAt);
  } catch (err) {
    console.warn('[yui] /converse failed; using legacy fallback', err);
    stopStreamAudio();
    try {
      await fallbackUtterance(blob);
    } catch (fallbackError) {
      showError(fallbackError);
    }
  } finally {
    if (ambientActive) startListening();
  }
}

function finishCurrentAudio() {
  const resolve = currentAudioResolve;
  if (currentAudio) {
    currentAudio.onended = null;
    currentAudio.onerror = null;
  }
  if (currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);
  currentAudio = null;
  currentAudioUrl = null;
  currentAudioResolve = null;
  if (resolve) resolve();
}

function stopCurrentAudio() {
  const stoppedStream = stopStreamAudio();
  if (!currentAudio) return stoppedStream;
  currentAudio.pause();
  finishCurrentAudio();
  return true;
}

function speakAndWait(text) {
  return new Promise(async (resolve) => {
    setState('speaking');
    try {
      const res = await apiFetch('/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      if (!res.ok) {
        showError(Object.assign(new Error(`/tts ${res.status}`), { status: res.status }));
        return resolve();
      }
      const blob = await res.blob();
      currentAudioUrl = URL.createObjectURL(blob);
      currentAudio = new Audio(currentAudioUrl);
      currentAudioResolve = resolve;
      currentAudio.onended = finishCurrentAudio;
      currentAudio.onerror = finishCurrentAudio;
      await currentAudio.play();
    } catch (err) {
      showError(err);
      if (currentAudio) finishCurrentAudio();
      else resolve();
    }
  });
}

async function enableAmbient() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    statusEl.textContent = 'マイクへのアクセスが許可されていません';
    return;
  }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  source.connect(analyser);

  ambientActive = true;
  if (!tickerTimer) {
    tickerTimer = setInterval(() => {
      if (currentState === 'ambient') updateAmbientStatus();
    }, 1000);
  }
  toggleBtn.textContent = 'オフにする';
  toggleBtn.classList.add('on');
  toggleBtn.setAttribute('aria-pressed', 'true');
  const hintKey = 'yui_initial_hint_shown';
  if (!localStorage.getItem(hintKey)) {
    const hint = '話しかけてね。雑談も聞いてタスクにするよ';
    localStorage.setItem(hintKey, '1');
    hintEl.classList.remove('error');
    hintEl.textContent = hint;
    await speakAndWait(hint);
  }
  if (!ambientActive) return;
  startListening();
}

function disableAmbient() {
  ambientActive = false;
  if (tickerTimer) { clearInterval(tickerTimer); tickerTimer = null; }
  stopVadWatch();
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  stopCurrentAudio();
  if (stream) { stream.getTracks().forEach((t) => t.stop()); stream = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  toggleBtn.textContent = 'そばに置く';
  toggleBtn.classList.remove('on');
  toggleBtn.setAttribute('aria-pressed', 'false');
  setState('off');
}

toggleBtn.addEventListener('click', () => {
  toggleBtn.disabled = true;
  (ambientActive ? Promise.resolve(disableAmbient()) : enableAmbient()).finally(() => {
    toggleBtn.disabled = false;
  });
});

function handleOrbStop() {
  if (stopCurrentAudio() && ambientActive) setState('ambient');
}

orb.addEventListener('click', handleOrbStop);
orb.addEventListener('keydown', (event) => {
  if (event.key === 'Enter' || event.key === ' ') {
    event.preventDefault();
    handleOrbStop();
  }
});

setState('off');
</script>
</body>
</html>
