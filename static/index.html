<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Yui</title>
<style>
  :root {
    --bg: #0f1115;
    --text: #e7e9ee;
    --sub: #8b93a7;
    --accent: #6ea8ff;
    --ambient: #3a4256;
    --captured: #4fd18b;
    --speaking: #6ea8ff;
    --thinking: #c99bff;
    --off: #e05a5a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", "Segoe UI", sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
  }
  h1 { font-size: 15px; font-weight: 500; letter-spacing: 0.08em; color: var(--sub); margin: 0; }

  #orb {
    width: 168px;
    height: 168px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #2a3040, #12141a);
    border: 2px solid #262b36;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
    transition: border-color 300ms ease, box-shadow 300ms ease, transform 300ms ease;
    cursor: pointer;
  }
  #orb.ambient { border-color: var(--ambient); animation: breathe 3.2s ease-in-out infinite; }
  #orb.captured { border-color: var(--captured); box-shadow: 0 0 40px rgba(79, 209, 139, 0.3); }
  #orb.thinking { border-color: var(--thinking); box-shadow: 0 0 40px rgba(201, 155, 255, 0.25); animation: spin 2.2s linear infinite; }
  #orb.speaking { border-color: var(--speaking); box-shadow: 0 0 40px rgba(110, 168, 255, 0.3); animation: pulse 0.9s ease-in-out infinite; }

  @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.85; } 50% { transform: scale(1.03); opacity: 1; } }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  #status { font-size: 14px; color: var(--sub); min-height: 20px; }
  #hint { font-size: 13px; color: var(--accent); min-height: 20px; }

  #toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: transparent;
    color: var(--sub);
    border: 1px solid #262b36;
    border-radius: 999px;
    padding: 8px 18px;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  #toggle.on { border-color: var(--captured); color: var(--captured); }
  #toggle:disabled { opacity: 0.5; cursor: default; }
  #dashLink {
    position: fixed;
    top: 20px;
    left: 20px;
    color: var(--sub);
    font-size: 13px;
    text-decoration: none;
  }
  #dashLink:hover { color: var(--accent); }

  /* ---- アクセシビリティ（WCAG 2.2 AA）---- */
  :focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
    }
  }
</style>
</head>
<body>
  <a id="dashLink" href="/dashboard.html">ダッシュボード →</a>
  <h1>YUI</h1>
  <button id="toggle" type="button">そばに置く</button>
  <div id="orb" role="button" tabindex="0" aria-label="再生中の音声を停止">🎧</div>
  <div id="status" role="status" aria-live="polite">オフになっています</div>
  <div id="hint" aria-live="polite"></div>

<script>
const orb = document.getElementById('orb');
const statusEl = document.getElementById('status');
const hintEl = document.getElementById('hint');
const toggleBtn = document.getElementById('toggle');

const sessionId = (() => {
  const key = 'yui_session_id';
  let id = localStorage.getItem(key);
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem(key, id);
  }
  return id;
})();

// アプリトークン: ?token=XXX で開くと sessionStorage に保持し、以後のAPI呼び出しに
// X-Yui-Token として付ける。本番は未認証だと保護エンドポイントが401になる。
const APP_TOKEN = (() => {
  const key = 'yui_app_token';
  const fromUrl = new URLSearchParams(window.location.search).get('token');
  if (fromUrl) { sessionStorage.setItem(key, fromUrl); return fromUrl; }
  return sessionStorage.getItem(key) || '';
})();

function apiFetch(url, options = {}) {
  const headers = { ...(options.headers || {}) };
  if (APP_TOKEN) headers['X-Yui-Token'] = APP_TOKEN;
  return fetch(url, { ...options, headers });
}

function queryNumber(name, fallback, min, max) {
  const value = Number(new URLSearchParams(window.location.search).get(name));
  return Number.isFinite(value) && value >= min && value <= max ? value : fallback;
}

// ?silence=1800&threshold=12 のように、会場で再デプロイせず調整できる。
const SILENCE_MS = queryNumber('silence', 2200, 200, 10000);
const MIN_SPEECH_MS = queryNumber('minSpeech', 500, 100, 5000);
const MAX_RECORD_MS = queryNumber('maxRecord', 20000, 1000, 60000);
const VOICE_THRESHOLD = queryNumber('threshold', 10, 1, 128);
// 音声認識が「ゆい」を同音の別表記に変換することがあるため候補を広めに取る
const WAKE_PATTERN = /ゆい|ユイ|唯|結衣|由衣|由井|優依|夕依|yui/i;
// 一度呼びかけたら、この時間内の発話は名前なしでも会話として扱う（雑談の継続）
const CONVERSATION_WINDOW_MS = queryNumber('conversation', 45000, 1000, 300000);

let ambientActive = false;
let conversationActiveUntil = 0;
let stream = null;
let audioCtx = null;
let analyser = null;
let vadTimer = null;
let mediaRecorder = null;
let recordedChunks = [];
let speechStartedAt = null;
let lastVoiceAt = null;
let maxRecordTimer = null;
let currentAudio = null;
let currentAudioUrl = null;
let currentAudioResolve = null;

function setState(state) {
  orb.classList.remove('ambient', 'captured', 'thinking', 'speaking');
  if (state === 'ambient') {
    orb.textContent = '🎧';
    orb.classList.add('ambient');
    statusEl.textContent = '待機中…（呼びかけると反応します）';
  } else if (state === 'captured') {
    orb.textContent = '📝';
    orb.classList.add('captured');
    statusEl.textContent = 'メモしました';
  } else if (state === 'thinking') {
    orb.textContent = '💭';
    orb.classList.add('thinking');
    statusEl.textContent = 'ゆいが考えています…';
  } else if (state === 'speaking') {
    orb.textContent = '💬';
    orb.classList.add('speaking');
    statusEl.textContent = 'ゆいが話しています…';
  } else {
    orb.textContent = '🎧';
    statusEl.textContent = 'オフになっています';
  }
}

function stopVadWatch() {
  if (vadTimer) { clearInterval(vadTimer); vadTimer = null; }
  if (maxRecordTimer) { clearTimeout(maxRecordTimer); maxRecordTimer = null; }
}

function startVadWatch() {
  const data = new Uint8Array(analyser.fftSize);
  speechStartedAt = Date.now();
  lastVoiceAt = null;

  vadTimer = setInterval(() => {
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) {
      const v = data[i] - 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / data.length);

    const elapsed = Date.now() - speechStartedAt;
    if (rms > VOICE_THRESHOLD) {
      lastVoiceAt = Date.now();
    }
    if (lastVoiceAt && elapsed > MIN_SPEECH_MS && (Date.now() - lastVoiceAt) > SILENCE_MS) {
      stopRecording();
    }
  }, 100);

  maxRecordTimer = setTimeout(() => stopRecording(), MAX_RECORD_MS);
}

async function startListening() {
  if (!ambientActive) return;
  recordedChunks = [];
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) recordedChunks.push(e.data);
  };
  mediaRecorder.onstop = async () => {
    stopVadWatch();
    const blob = new Blob(recordedChunks, { type: 'audio/webm' });
    if (blob.size < 2000) {
      if (ambientActive) startListening();
      return;
    }
    await handleUtterance(blob);
  };
  mediaRecorder.start();
  setState('ambient');
  startVadWatch();
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

async function handleUtterance(blob) {
  setState('thinking');
  try {
    const transcribeRes = await apiFetch('/transcribe', {
      method: 'POST',
      headers: { 'Content-Type': 'audio/webm' },
      body: blob,
    });
    const transcribeData = await transcribeRes.json();
    const text = (transcribeData.text || '').trim();
    if (!text) {
      if (ambientActive) startListening();
      return;
    }

    const inConversation = Date.now() < conversationActiveUntil;
    if (WAKE_PATTERN.test(text) || inConversation) {
      // 「ゆい」への呼びかけ、または会話継続中: 会話して声で返す
      const chatRes = await apiFetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });
      const chatData = await chatRes.json();
      if (chatRes.ok && chatData.reply) {
        conversationActiveUntil = Date.now() + CONVERSATION_WINDOW_MS;
        await speakAndWait(chatData.reply);
      }
    } else {
      // 呼びかけではない独り言: 声には出さず、静かにタスクだけ拾う
      const processRes = await apiFetch('/process', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      const processData = await processRes.json();
      if (processRes.ok && processData.tasks && processData.tasks.length) {
        setState('captured');
        await new Promise((r) => setTimeout(r, 900));
      }
    }
  } catch (err) {
    // 通信エラーでも待機は止めず、次の発話を待つ
  } finally {
    if (ambientActive) startListening();
  }
}

function finishCurrentAudio() {
  const resolve = currentAudioResolve;
  if (currentAudio) {
    currentAudio.onended = null;
    currentAudio.onerror = null;
  }
  if (currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);
  currentAudio = null;
  currentAudioUrl = null;
  currentAudioResolve = null;
  if (resolve) resolve();
}

function stopCurrentAudio() {
  if (!currentAudio) return false;
  currentAudio.pause();
  finishCurrentAudio();
  return true;
}

function speakAndWait(text) {
  return new Promise(async (resolve) => {
    setState('speaking');
    try {
      const res = await apiFetch('/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      if (!res.ok) return resolve();
      const blob = await res.blob();
      currentAudioUrl = URL.createObjectURL(blob);
      currentAudio = new Audio(currentAudioUrl);
      currentAudioResolve = resolve;
      currentAudio.onended = finishCurrentAudio;
      currentAudio.onerror = finishCurrentAudio;
      await currentAudio.play();
    } catch (err) {
      if (currentAudio) finishCurrentAudio();
      else resolve();
    }
  });
}

async function enableAmbient() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    statusEl.textContent = 'マイクへのアクセスが許可されていません';
    return;
  }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  source.connect(analyser);

  ambientActive = true;
  toggleBtn.textContent = 'オフにする';
  toggleBtn.classList.add('on');
  const hintKey = 'yui_initial_hint_shown';
  if (!localStorage.getItem(hintKey)) {
    const hint = '「ゆい」と呼びかけてね。独り言も聞いてタスクにするよ';
    localStorage.setItem(hintKey, '1');
    hintEl.textContent = hint;
    await speakAndWait(hint);
  }
  if (!ambientActive) return;
  startListening();
}

function disableAmbient() {
  ambientActive = false;
  conversationActiveUntil = 0;
  stopVadWatch();
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  stopCurrentAudio();
  if (stream) { stream.getTracks().forEach((t) => t.stop()); stream = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  toggleBtn.textContent = 'そばに置く';
  toggleBtn.classList.remove('on');
  setState('off');
}

toggleBtn.addEventListener('click', () => {
  toggleBtn.disabled = true;
  (ambientActive ? Promise.resolve(disableAmbient()) : enableAmbient()).finally(() => {
    toggleBtn.disabled = false;
  });
});

function handleOrbStop() {
  if (stopCurrentAudio() && ambientActive) setState('ambient');
}

orb.addEventListener('click', handleOrbStop);
orb.addEventListener('keydown', (event) => {
  if (event.key === 'Enter' || event.key === ' ') {
    event.preventDefault();
    handleOrbStop();
  }
});

setState('off');
</script>
</body>
</html>
