<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Yui — あなたの秘書エージェント</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #262b36;
    --text: #e7e9ee;
    --sub: #8b93a7;
    --accent: #6ea8ff;
    --yui-bubble: #1f2430;
    --user-bubble: #2b3a55;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", "Segoe UI", sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  header h1 { font-size: 16px; margin: 0; letter-spacing: 0.02em; }
  header span { font-size: 12px; color: var(--sub); }
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  .row { display: flex; flex-direction: column; max-width: 78%; }
  .row.user { align-self: flex-end; align-items: flex-end; }
  .row.yui { align-self: flex-start; align-items: flex-start; }
  .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.55;
    font-size: 14.5px;
    white-space: pre-wrap;
  }
  .row.user .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; }
  .row.yui .bubble { background: var(--yui-bubble); border-bottom-left-radius: 4px; }
  .tasks {
    margin-top: 6px;
    font-size: 12px;
    color: var(--sub);
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .tasks .task {
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: rgba(110, 168, 255, 0.06);
  }
  .tasks .task.promoted { border-color: var(--accent); color: var(--accent); }
  form {
    border-top: 1px solid var(--border);
    padding: 14px 20px 20px;
    display: flex;
    gap: 10px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  input[type=text] {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 14.5px;
  }
  input[type=text]:focus { outline: none; border-color: var(--accent); }
  button {
    background: var(--accent);
    color: #0b0e14;
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .typing { color: var(--sub); font-size: 13px; padding-left: 4px; }
</style>
</head>
<body>
  <header>
    <h1>Yui</h1>
    <span>入力されなかったタスクを発見する対話エージェント</span>
    <button id="mute" type="button" style="margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--sub);border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;">🔊 音声ON</button>
  </header>
  <div id="log"></div>
  <form id="form">
    <input id="input" type="text" placeholder="ゆいに話しかけてみる…" autocomplete="off" />
    <button id="send" type="submit">送信</button>
  </form>

<script>
const log = document.getElementById('log');
const form = document.getElementById('form');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');

const muteBtn = document.getElementById('mute');
let muted = localStorage.getItem('yui_muted') === '1';
function updateMuteBtn() {
  muteBtn.textContent = muted ? '🔇 音声OFF' : '🔊 音声ON';
}
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  localStorage.setItem('yui_muted', muted ? '1' : '0');
  updateMuteBtn();
});

async function speak(text) {
  if (muted || !text) return;
  try {
    const res = await fetch('/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    if (!res.ok) return;
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.play().catch(() => {});
  } catch (err) {
    // 音声再生の失敗はチャット自体を止めない
  }
}

const sessionId = (() => {
  const key = 'yui_session_id';
  let id = localStorage.getItem(key);
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem(key, id);
  }
  return id;
})();

function addRow(role, text, tasks) {
  const row = document.createElement('div');
  row.className = 'row ' + role;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  row.appendChild(bubble);

  if (tasks && tasks.length) {
    const box = document.createElement('div');
    box.className = 'tasks';
    for (const t of tasks) {
      const line = document.createElement('div');
      line.className = 'task' + (t.promoted ? ' promoted' : '');
      const priorityLabel = ['', '⚪', '🟢', '🟡', '🟠', '🔴'][t.priority] || '';
      line.textContent = `${priorityLabel} ${t.title}` + (t.promoted ? `（優先度を昇格: ${t.previous_priority} → ${t.priority}）` : '');
      box.appendChild(line);
    }
    row.appendChild(box);
  }

  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
  return row;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;

  addRow('user', text);
  input.value = '';
  sendBtn.disabled = true;

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.textContent = 'ゆいが考え中…';
  log.appendChild(typing);
  log.scrollTop = log.scrollHeight;

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message: text }),
    });
    const data = await res.json();
    typing.remove();
    if (!res.ok) {
      addRow('yui', 'エラーが発生しました。もう一度試してください。');
    } else {
      addRow('yui', data.reply, data.tasks);
      speak(data.reply);
    }
  } catch (err) {
    typing.remove();
    addRow('yui', '通信エラーが発生しました。');
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
});

addRow('yui', 'こんにちは、ゆいです。今日あったこと、思いついたこと、なんでも話しかけてみてください。');
</script>
</body>
</html>
